<article style="min-height: 100vh;" class="bg-custom-dark">

  <!-- Buscador -->

  <section class="container pt-5">
      <div class="app-search d-flex">
          <input 
              [(ngModel)]="inputSearch"
              type="text" 
              class="form-control" 
              placeholder="Buscar curso"
              (ngModelChange)="onSearch(inputSearch)"
          > 
      </div>
  </section>

  <!-- Listado -->

  <section class="album py-5">
    <div class="container" style="color:white">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
        <app-curso class="fade-in" [curso]="curso" [user]="userType" *ngFor="let curso of cursos"></app-curso>

        <div class="col fade-in" *ngIf="userType == 'profesor' && inputSearch == '' " (click)="onAddCurso()">
          <div class="card shadow-sm bg-dark">
            <img width="100%" height="360" src="../../assets/defaultIMG.svg">
          </div>
        </div>

      </div>

    </div>
  </section>
</article>
